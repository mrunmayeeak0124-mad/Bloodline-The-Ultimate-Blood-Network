<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloodline | Blood Bag Check</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-red: #ff3131;
            --bg-light: #f8f9fa;
            --glass: rgba(255, 255, 255, 0.95);
            --safe-green: #00b894;
            --unsafe-red: #d63031;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            background-color: var(--bg-light);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 60px;
        }

        /* Branding */
        .brand-container {
            position: absolute;
            top: 30px; left: 40px;
            display: flex; align-items: center; gap: 12px;
        }

        .logo-mark {
            width: 30px; height: 30px;
            background: var(--primary-red);
            border-radius: 50% 50% 50% 10%;
            transform: rotate(-45deg);
        }

        .brand-text { font-size: 1.5rem; font-weight: 800; margin: 0; }
        .brand-text span { color: var(--primary-red); }

        /* Back Button */
        .back-btn {
            position: absolute;
            top: 35px; right: 40px;
            text-decoration: none; color: #1a1a1a;
            font-weight: 700; padding: 10px 20px;
            background: white; border-radius: 12px;
            border: 1px solid #e2e8f0; transition: 0.3s;
        }
        .back-btn:hover { background: var(--primary-red); color: white; }

        /* Header */
        header { margin-top: 120px; text-align: center; margin-bottom: 50px; }
        h1 {
            font-size: 3rem; font-weight: 800;
            text-transform: uppercase; letter-spacing: 8px;
            margin: 0; color: #0f172a;
        }

        /* Table Design */
        .table-wrap {
            width: 90%; max-width: 1100px;
            background: var(--glass); border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.05); overflow: hidden;
        }

        table { width: 100%; border-collapse: collapse; }
        th {
            background: #fdfdfd; padding: 22px;
            text-align: center; font-size: 0.8rem;
            text-transform: uppercase; letter-spacing: 1.5px;
            color: #636e72; border-bottom: 2px solid #f1f2f6;
        }

        td { padding: 20px; border-bottom: 1px solid #f1f2f6; text-align: center; font-weight: 600; }

        .tick { color: var(--safe-green); font-size: 1.4rem; font-weight: 900; }
        .cross { color: var(--unsafe-red); font-size: 1.4rem; font-weight: 900; }

        /* Status Badges */
        .status-badge {
            padding: 6px 15px; border-radius: 50px;
            font-size: 0.75rem; font-weight: 800;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .safe { background: #e6fffb; color: var(--safe-green); border: 1px solid var(--safe-green); }
        .unsafe { background: #fff1f0; color: var(--unsafe-red); border: 1px solid var(--unsafe-red); }

        .bag-name { color: #2d3436; text-align: left; padding-left: 40px; }

        /* Symbol Legend Section */
        .legend-container {
            margin-top: 40px;
            width: 90%; max-width: 1100px;
            background: white; border-radius: 20px;
            padding: 20px 40px; border: 1px solid #e2e8f0;
            display: flex; gap: 40px; justify-content: center;
        }

        .legend-item { display: flex; align-items: center; gap: 12px; font-weight: 600; font-size: 0.9rem; }
        .legend-item b { font-size: 1.2rem; }

    </style>
</head>
<body>

    <div class="brand-container">
        <div class="logo-mark"></div>
        <h1 class="brand-text">blood<span>line</span></h1>
    </div>

    <a href="trial1.html" class="back-btn">← DASHBOARD</a>
    

    <header>
        <h1>Blood Bag Check</h1>
    </header>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th style="text-align: left; padding-left: 40px;">Blood Bag Name</th>
                    <th>HIV Check</th>
                    <th>VDRL Check</th>
                    <th>Hepatitis B Check</th>
                    <th>Hepatitis C Check</th>
                    <th>Safe or Not</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td class="bag-name">BAG-A102</td>
                    <td class="tick">✓</td>
                    <td class="tick">✓</td>
                    <td class="tick">✓</td>
                    <td class="tick">✓</td>
                    <td><span class="status-badge safe">SAFE</span></td>
                </tr>
                <tr>
                    <td class="bag-name">BAG-B405</td>
                    <td class="tick">✓</td>
                    <td class="cross">✗</td>
                    <td class="tick">✓</td>
                    <td class="tick">✓</td>
                    <td><span class="status-badge unsafe">UNSAFE</span></td>
                </tr>
                <tr>
                    <td class="bag-name">BAG-O991</td>
                    <td class="tick">✓</td>
                    <td class="tick">✓</td>
                    <td class="tick">✓</td>
                    <td class="tick">✓</td>
                    <td><span class="status-badge safe">SAFE</span></td>
                </tr>
                <tr>
                    <td class="bag-name">BAG-AB22</td>
                    <td class="cross">✗</td>
                    <td class="tick">✓</td>
                    <td class="cross">✗</td>
                    <td class="tick">✓</td>
                    <td><span class="status-badge unsafe">UNSAFE</span></td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="legend-container">
        <div class="legend-item">
            <b class="tick">✓</b> <span>Not Infected (Safe)</span>
        </div>
        <div class="legend-item">
            <b class="cross">✗</b> <span>Infected (Danger)</span>
        </div>
    </div>

</body>
</html>
