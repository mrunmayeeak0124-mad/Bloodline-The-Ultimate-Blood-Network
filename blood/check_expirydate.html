<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blood Bank Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-red: #ff3131;
            --accent-glow: rgba(255, 49, 49, 0.5);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            
            /* Enhanced background overlay for better contrast */
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.7)), 
                        url('https://plus.unsplash.com/premium_vector-1720636314575-748da2042f21?fm=jpg&q=60&w=3000&ixlib=rb-4.1.0');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* 1. Logo and Bloodline Title Section */
        .brand-container {
            position: absolute;
            top: 40px;
            left: 50px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-mark {
            width: 35px;
            height: 35px;
            background: var(--primary-red);
            border-radius: 50% 50% 50% 10%;
            transform: rotate(-45deg);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .brand-text {
            color: white;
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin: 0;
        }

        .brand-text span {
            color: var(--primary-red);
        }

        /* Main Header */
        h2 {
            color: white; 
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 40px;
            text-align: center;
            letter-spacing: -1.5px;
            text-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        /* Enhanced Glass Container */
        .blood-group-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            max-width: 600px;
            padding: 50px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        /* Bright & Enhanced Buttons */
        .blood-btn {
            width: 100px;
            height: 100px;
            border-radius: 28px;
            border: 2px solid rgba(255, 255, 255, 0.4);
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1.4rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .blood-btn:hover {
            background-color: white;
            color: var(--primary-red);
            transform: scale(1.15) translateY(-8px);
            border-color: white;
            box-shadow: 0 20px 40px rgba(255, 49, 49, 0.4);
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .brand-container { position: relative; top: 0; left: 0; margin-bottom: 40px; }
            h2 { font-size: 2.2rem; }
            .blood-btn { width: 80px; height: 80px; }
        }

        .back-home {
                position: absolute;
                top: 40px;
                right: 50px;
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 12px 20px;
                background: rgba(255, 255, 255, 0.1);
                border: 1px solid rgba(255, 255, 255, 0.2);
                border-radius: 15px;
                color: white;
                text-decoration: none;
                
                font-size: 0.9rem;
                backdrop-filter: blur(10px);
                transition: all 0.3s ease;
                z-index: 100;
            }

        .back-home svg {
                width: 18px;
                height: 18px;
                fill: white;
            }

            .back-home:hover {
                background: white;
                color: #ff3131;
                transform: translateX(-5px); /* Slight slide effect */
            }

           .back-home:hover svg {
                fill: #ff3131;
            }

/* Mobile fix */
@media (max-width: 768px) {
    .back-home {
        top: auto;
        bottom: 30px;
        right: 50%;
        transform: translateX(50%);
    }
    .back-home:hover {
        transform: translateX(50%) scale(1.05);
    }
}
    </style>
</head>
<body>

    <div class="brand-container">
        <div class="logo-mark"></div>
        <h1 class="brand-text">blood<span>line</span></h1>
    </div>

    <a href="trial1.html" class="back-home">
    <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    Back to Home
    </a>

    <h2>Select a Blood Group</h2>

    <!-- Replace your static link blocks inside select-blood-group.html with this parameter setup: -->
<div class="blood-group-container">
    <a href="inventory-focus.html?group=A%2B" class="blood-btn" style="text-decoration:none;">A+</a>
    <a href="inventory-focus.html?group=A-" class="blood-btn" style="text-decoration:none;">A-</a>
    <a href="inventory-focus.html?group=B%2B" class="blood-btn" style="text-decoration:none;">B+</a>
    <a href="inventory-focus.html?group=B-" class="blood-btn" style="text-decoration:none;">B-</a>
    <a href="inventory-focus.html?group=AB%2B" class="blood-btn" style="text-decoration:none;">AB+</a>
    <a href="inventory-focus.html?group=AB-" class="blood-btn" style="text-decoration:none;">AB-</a>
    <a href="inventory-focus.html?group=O%2B" class="blood-btn" style="text-decoration:none;">O+</a>
    <a href="inventory-focus.html?group=O-" class="blood-btn" style="text-decoration:none;">O-</a>
</div>
</body>
</html>
