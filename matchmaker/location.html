<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HemoFlow — Real-Time Donor Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<style>
  :root {
    --red: #d62828;
    --red-deep: #9b1b1b;
    --red-glow: rgba(214,40,40,0.18);
    --bg: #0e0b0b;
    --surface: #1a1212;
    --surface2: #221818;
    --border: rgba(214,40,40,0.15);
    --text: #f5eded;
    --text-muted: #9e8a8a;
    --green: #3ddc84;
    --amber: #ffb347;
    --blue: #60a5fa;
    --radius: 14px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ── */
  .header {
    background: rgba(14,11,11,0.95);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    height: 58px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    z-index: 1000;
  }

  .logo-dropdown-container {
    position: relative;
    display: inline-block;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 18px;
    letter-spacing: 0.04em;
    color: var(--text);
    cursor: pointer;
    padding: 6px 10px;
    border-radius: 8px;
    transition: background 0.2s;
  }

  .logo:hover {
    background: rgba(214,40,40,0.1);
  }

  .logo-drop {
    width: 30px; height: 30px;
    background: var(--red);
    border-radius: 50% 50% 50% 10%;
    transform: rotate(-30deg);
    box-shadow: 0 0 14px var(--red-glow);
    animation: pulse-glow 2.5s ease-in-out infinite;
    flex-shrink: 0;
  }

  @keyframes pulse-glow {
    0%,100% { box-shadow: 0 0 10px var(--red-glow); }
    50%      { box-shadow: 0 0 24px rgba(214,40,40,0.45); }
  }

  /* ── TOOLBAR ── */
  .toolbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
    flex-shrink: 0;
    z-index: 999;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 160px;
  }

  .search-icon {
    position: absolute;
    left: 10px; top: 50%;
    transform: translateY(-50%);
    font-size: 14px;
    color: var(--text-muted);
    pointer-events: none;
  }

  .search-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 12px 8px 32px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .search-input:focus {
    border-color: var(--red);
    box-shadow: 0 0 0 3px rgba(214,40,40,0.1);
  }

  .search-input::placeholder { color: var(--text-muted); }

  .filter-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  .filter-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 14px;
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .filter-btn.active-filter {
    border-color: var(--red);
    color: var(--red);
    background: var(--red-glow);
  }

  .locate-btn {
    background: var(--red);
    border: none;
    border-radius: 10px;
    padding: 8px 14px;
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    box-shadow: 0 2px 10px rgba(214,40,40,0.25);
  }

  .add-btn {
    background: #3ddc84;
    border: none;
    border-radius: 10px;
    padding: 8px 14px;
    color: #0e0b0b;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  /* ── MAIN LAYOUT ── */
  .main { display: flex; flex: 1; overflow: hidden; }
  #map { flex: 1; z-index: 1; }

  /* ── SIDE LIST ── */
  .side-list {
    width: 300px;
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }

  .list-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .list-title { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; }

  .list-count {
    background: var(--red-glow);
    color: var(--red);
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 20px;
    border: 1px solid rgba(214,40,40,0.25);
  }

  .list-scroll { flex: 1; overflow-y: auto; padding: 8px; }

  .list-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .list-item:hover { border-color: rgba(214,40,40,0.4); transform: translateX(-2px); }

  .list-item-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }

  .list-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: white;
    flex-shrink: 0;
  }

  .list-avatar.donor { background: linear-gradient(135deg, var(--red-deep), var(--red)); }
  .list-avatar.patient { background: linear-gradient(135deg, #1e3a5f, #2563eb); }

  .list-name { font-size: 14px; font-weight: 600; color: var(--text); }
  .list-sub { font-size: 11px; color: var(--text-muted); }
  .list-blood { margin-left: auto; font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 800; color: var(--red); }

  .list-item-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }

  .type-pill {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    padding: 2px 7px; border-radius: 4px;
  }

  .type-pill.donor { background: rgba(214,40,40,0.12); color: var(--red); }
  .type-pill.patient { background: rgba(96,165,250,0.12); color: var(--blue); }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(8px);
    z-index: 5000;
    align-items: center; justify-content: center;
  }

  .modal-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    width: 90%; max-width: 420px;
    box-shadow: 0 16px 40px rgba(0,0,0,0.6);
  }

  .modal-card h3 { font-family: 'Syne', sans-serif; font-size: 18px; margin-bottom: 14px; color: var(--red); }

  .form-group { margin-bottom: 12px; display: flex; flex-direction: column; gap: 4px; }
  .form-group label { font-size: 12px; color: var(--text-muted); font-weight: 600; }
  .form-group input, .form-group select {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px; color: var(--text); font-family: inherit; font-size: 13px;
  }

  .modal-actions { display: flex; gap: 10px; margin-top: 18px; }
  .save-btn { flex: 1; background: var(--red); color: white; border: none; padding: 10px; border-radius: 8px; font-weight: 700; cursor: pointer; }
  .cancel-btn { background: transparent; color: var(--text-muted); border: 1px solid var(--border); padding: 10px; border-radius: 8px; cursor: pointer; }

  /* ── LEAFLET OVERRIDES ── */
  .leaflet-container { background: #1a1212 !important; }
  .leaflet-tile { filter: invert(1) hue-rotate(180deg) brightness(0.85) contrast(0.9); }
  .leaflet-popup-content-wrapper {
    background: var(--surface) !important; color: var(--text) !important;
    border: 1px solid var(--border) !important; border-radius: 12px !important;
  }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 20px; font-size: 13px; color: var(--text); z-index: 9999;
    opacity: 0; transition: all 0.3s; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="logo">
    <div class="logo-drop"></div>
    HEMOFLOW
  </div>
  <div style="font-size:12px;color:var(--text-muted);letter-spacing:0.06em;font-weight:500;">LIVE DONOR TRACKER</div>
</header>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="searchInput" placeholder="Search name or city..." oninput="renderAll()">
  </div>

  <select class="filter-select" id="bloodFilter" onchange="renderAll()">
    <option value="">All Blood Groups</option>
    <option value="O+">O+</option><option value="O-">O−</option>
    <option value="A+">A+</option><option value="A-">A−</option>
    <option value="B+">B+</option><option value="B-">B−</option>
    <option value="AB+">AB+</option><option value="AB-">AB−</option>
  </select>

  <button class="filter-btn active-filter" id="btnAll" onclick="setTypeFilter('all')">All</button>
  <button class="filter-btn" id="btnDonors" onclick="setTypeFilter('donor')">🔴 Donors</button>
  <button class="filter-btn" id="btnPatients" onclick="setTypeFilter('patient')">🔵 Patients</button>

  <button class="add-btn" onclick="openModal()">+ Register Live Donor</button>
  <button class="locate-btn" onclick="startLiveTracking()">📡 Start Live GPS</button>
</div>

<!-- MAIN LAYOUT -->
<div class="main">
  <div id="map"></div>

  <div class="side-list">
    <div class="list-header">
      <span class="list-title">Active Live Network</span>
      <span class="list-count" id="listCount">0</span>
    </div>
    <div class="list-scroll" id="listScroll"></div>
  </div>
</div>

<!-- REGISTER DONOR MODAL -->
<div class="modal-overlay" id="donorModal">
  <div class="modal-card">
    <h3>Register Live Donor</h3>
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="regName" placeholder="e.g. Rahul Sharma">
    </div>
    <div class="form-group">
      <label>Role</label>
      <select id="regType">
        <option value="donor">Donor (🔴)</option>
        <option value="patient">Patient (🔵)</option>
      </select>
    </div>
    <div class="form-group">
      <label>Blood Group</label>
      <select id="regBlood">
        <option value="O+">O+</option><option value="O-">O-</option>
        <option value="A+">A+</option><option value="A-">A-</option>
        <option value="B+">B+</option><option value="B-">B-</option>
        <option value="AB+">AB+</option><option value="AB-">AB-</option>
      </select>
    </div>
    <div class="form-group">
      <label>City / Suburb</label>
      <input type="text" id="regCity" placeholder="e.g. Chinchwad, Pune">
    </div>
    <div class="form-group">
      <label>Email / Phone</label>
      <input type="text" id="regContact" placeholder="e.g. donor@hemoflow.org">
    </div>
    <div class="modal-actions">
      <button class="save-btn" onclick="saveNewDonor()">Save & Pin to Live Map</button>
      <button class="cancel-btn" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
// 1. INITIALIZE DATABASE WITH PERSISTENT LOCAL STORAGE RETENTION
const initialLocations = [
  { id:1, name:"Rahul Sharma", type:"donor", blood:"O+", lat:18.6298, lng:73.7997, city:"Chinchwad, Pune", contact:"rahul@hemoflow.org" },
  { id:2, name:"Sneha Kapoor", type:"donor", blood:"B+", lat:18.6200, lng:73.8100, city:"Pimpri, Pune", contact:"sneha@hemoflow.org" },
  { id:3, name:"Amit Verma", type:"patient", blood:"A+", lat:18.6400, lng:73.7800, city:"Nigdi, Pune", contact:"amit@hemoflow.org" }
];

let locations = JSON.parse(localStorage.getItem('hemoflow_donors')) || initialLocations;

function persistData() {
  localStorage.setItem('hemoflow_donors', JSON.stringify(locations));
}

let typeFilter = 'all';
let userLatLng = null;
let userMarker = null;
let markers = [];
let watchId = null;

// Init Leaflet map centered at local coordinates
const map = L.map('map').setView([18.6298, 73.7997], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

function getInitials(name) {
  return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2);
}

function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLng = (lng2-lng1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return (R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))).toFixed(1);
}

function createMarkerIcon(type) {
  const color = type === 'donor' ? '#d62828' : '#60a5fa';
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="36" viewBox="0 0 28 36">
    <ellipse cx="14" cy="33" rx="5" ry="2.5" fill="rgba(0,0,0,0.25)"/>
    <path d="M14 2 C14 2, 2 14, 2 21 A12 12 0 0 0 26 21 C26 14, 14 2, 14 2Z" fill="${color}" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <circle cx="14" cy="20" r="5" fill="rgba(255,255,255,0.25)"/>
  </svg>`;
  return L.divIcon({ html: svg, className: '', iconSize: [28, 36], iconAnchor: [14, 36], popupAnchor: [0, -38] });
}

function renderAll() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const blood = document.getElementById('bloodFilter').value;

  markers.forEach(m => map.removeLayer(m.marker));
  markers = [];

  const filtered = locations.filter(loc => {
    const matchType = typeFilter === 'all' || loc.type === typeFilter;
    const matchBlood = !blood || loc.blood === blood;
    const matchSearch = !search || loc.name.toLowerCase().includes(search) || loc.city.toLowerCase().includes(search);
    return matchType && matchBlood && matchSearch;
  });

  filtered.forEach(loc => {
    const popupHtml = `
      <div style="min-width:160px;">
        <span style="font-size:10px;font-weight:700;color:${loc.type === 'donor' ? '#d62828' : '#60a5fa'}">${loc.type.toUpperCase()}</span>
        <span style="float:right;font-weight:800;color:#d62828;">${loc.blood}</span>
        <div style="font-weight:700;font-size:15px;margin-top:4px;">${loc.name}</div>
        <div style="font-size:11px;color:#9e8a8a;">📍 ${loc.city}</div>
        <div style="font-size:11px;color:#9e8a8a;margin-top:2px;">✉️ ${loc.contact}</div>
      </div>
    `;

    const marker = L.marker([loc.lat, loc.lng], { icon: createMarkerIcon(loc.type) })
      .addTo(map)
      .bindPopup(popupHtml);
    markers.push({ id: loc.id, marker, loc });
  });

  renderList(filtered);
  document.getElementById('listCount').textContent = filtered.length;
}

function renderList(filtered) {
  const scroll = document.getElementById('listScroll');
  scroll.innerHTML = '';

  if (!filtered.length) {
    scroll.innerHTML = `<div style="text-align:center;padding:30px;color:var(--text-muted);font-size:13px;">No active entries found</div>`;
    return;
  }

  filtered.forEach(loc => {
    const dist = userLatLng ? `📏 ${haversine(userLatLng.lat, userLatLng.lng, loc.lat, loc.lng)} km` : loc.city;
    const el = document.createElement('div');
    el.className = 'list-item';
    el.innerHTML = `
      <div class="list-item-header">
        <div class="list-avatar ${loc.type}">${getInitials(loc.name)}</div>
        <div>
          <div class="list-name">${loc.name}</div>
          <div class="list-sub">${loc.city}</div>
        </div>
        <div class="list-blood">${loc.blood}</div>
      </div>
      <div class="list-item-footer">
        <span style="font-size:11px;color:var(--text-muted);">📍 ${dist}</span>
        <span class="type-pill ${loc.type}">${loc.type}</span>
      </div>`;
    el.onclick = () => {
      map.setView([loc.lat, loc.lng], 15);
      const m = markers.find(item => item.id === loc.id);
      if (m) m.marker.openPopup();
    };
    scroll.appendChild(el);
  });
}

// 2. REAL-TIME CONTINUOUS GEOLOCATION WATCHING ENGINE
function startLiveTracking() {
  if (!navigator.geolocation) {
    showToast("Geolocation not supported on this browser.");
    return;
  }

  showToast("📡 Connecting to Real-Time Satellite GPS...");

  watchId = navigator.geolocation.watchPosition(
    pos => {
      userLatLng = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      
      if (userMarker) {
        userMarker.setLatLng([userLatLng.lat, userLatLng.lng]);
      } else {
        const youIcon = L.divIcon({
          html: `<div style="width:18px;height:18px;background:#3ddc84;border-radius:50%;border:3px solid white;box-shadow:0 0 14px rgba(61,220,132,0.8);"></div>`,
          className: '', iconSize: [18,18], iconAnchor: [9,9]
        });
        userMarker = L.marker([userLatLng.lat, userLatLng.lng], { icon: youIcon })
          .addTo(map)
          .bindPopup('<div style="color:#f5eded;font-size:13px;font-weight:700;">📍 You are Live Here</div>');
        map.setView([userLatLng.lat, userLatLng.lng], 14);
      }
      showToast("📡 Live Position Synchronized!");
      renderAll();
    },
    err => showToast("⚠️ Position lock failed. Ensure GPS permission is active."),
    { enableHighAccuracy: true, maximumAge: 10000, timeout: 5000 }
  );
}

// 3. DONOR MODAL REGISTRATION & PERSISTENCE
function openModal() { document.getElementById('donorModal').style.display = 'flex'; }
function closeModal() { document.getElementById('donorModal').style.display = 'none'; }

function saveNewDonor() {
  const name = document.getElementById('regName').value.trim();
  const type = document.getElementById('regType').value;
  const blood = document.getElementById('regBlood').value;
  const city = document.getElementById('regCity').value.trim();
  const contact = document.getElementById('regContact').value.trim();

  if (!name || !city) {
    showToast("Please fill out name and city location!");
    return;
  }

  const baseLat = userLatLng ? userLatLng.lat : 18.6298;
  const baseLng = userLatLng ? userLatLng.lng : 73.7997;

  const newRecord = {
    id: Date.now(),
    name, type, blood, city, contact,
    lat: baseLat + (Math.random() - 0.5) * 0.02,
    lng: baseLng + (Math.random() - 0.5) * 0.02
  };

  locations.push(newRecord);
  persistData(); 
  renderAll();
  closeModal();
  showToast(`✅ Registered ${name} to Live Map Database!`);
}

function setTypeFilter(type) {
  typeFilter = type;
  document.getElementById('btnAll').classList.toggle('active-filter', type==='all');
  document.getElementById('btnDonors').classList.toggle('active-filter', type==='donor');
  document.getElementById('btnPatients').classList.toggle('active-filter', type==='patient');
  renderAll();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// 4. PARSE URL PARAMETERS FROM REGISTER SEARCH
function applyUrlBloodFilter() {
    const urlParams = new URLSearchParams(window.location.search);
    const bloodFromUrl = urlParams.get('blood');

    if (bloodFromUrl) {
        const bloodSelect = document.getElementById('bloodFilter');
        if (bloodSelect) {
            bloodSelect.value = bloodFromUrl; 
            showToast(`🔍 Auto-filtered for ${bloodFromUrl} donors`);
        }
    }
}

// EXECUTION SEQUENCE
applyUrlBloodFilter();
renderAll();
</script>
</body>
</html>
